<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container">
        <h1 id="main-heading">Save Our Wildlife</h1>

        <div class="video-wrapper" id="videoContainer">
            <video id="wildlifeVideo" controls aria-labelledby="main-heading">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag. Please upgrade your browser.
            </video>
        </div>

        <div class="btn-container">
            <button class="action-btn" id="toggleBtn" aria-live="polite">Play Video</button>
        </div>

        <p class="description">
            Our ecosystems are hanging in a delicate balance. Discover the magnificent wildlife species fighting extinction across our global habitats and learn how you can take meaningful action today to conserve their homes for generations to come.
        </p>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
